{# 角色权限编辑弹窗，由 GET /ui/roles/{name}/permissions 返回 #}
<div class="modal-overlay" id="rolePermOverlay"
     onclick="if(event.target===this)this.remove()" onkeydown="if(event.key==='Escape')this.remove()">
  <div class="modal-card" id="rolePermCard" style="width:480px">

    <h3>工具权限 · {{ name | e }}</h3>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">勾选该角色可以调用的 API 工具</p>

    <form hx-put="/ui/roles/{{ name | e }}/permissions" hx-target="#roleList" hx-swap="innerHTML"
          hx-on::after-request="document.getElementById('rolePermOverlay').remove()">

      <div style="display:flex;flex-wrap:wrap;gap:10px">
        {% if all_tools %}
        {% for tn in all_tools %}
        <label style="font-size:12px;cursor:pointer;padding:6px 14px;border:1px solid var(--border);
                      border-radius:18px;display:inline-flex;align-items:center;gap:6px;
                      {% if tn in allowed %}background:rgba(99,102,241,0.2);border-color:var(--primary);color:var(--primary){% endif %}">
          <input type="checkbox" name="tool" value="{{ tn | e }}" style="margin:0"
                 {% if tn in allowed %}checked{% endif %}> {{ tn | e }}
        </label>
        {% endfor %}
        {% else %}
        <span style="color:var(--text-muted);font-size:12px">暂无工具可配置</span>
        {% endif %}
      </div>

      <div style="margin-top:16px;display:flex;align-items:center;gap:10px">
        <button class="btn btn-primary" type="submit">保存权限</button>
        <button class="btn btn-outline" type="button" onclick="document.getElementById('rolePermOverlay').remove()">取消</button>
      </div>

    </form>
  </div>
</div>
