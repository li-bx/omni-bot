<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 数字化智能服务平台</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body x-data="appState()" x-init="init()">

<!-- 隐藏表单：吸收浏览器自动填充 -->
<div style="position:absolute;opacity:0;pointer-events:none;height:0;overflow:hidden" aria-hidden="true">
  <input type="text" name="username" autocomplete="username" tabindex="-1">
  <input type="password" name="password" autocomplete="current-password" tabindex="-1">
</div>

<!-- ====== 导航栏 ====== -->
<nav class="navbar" x-data>
  <div class="navbar-inner">
    <div class="brand">
      <div class="logo">
        <span class="logo-core">
          <span class="nn-node ctr"></span>
          <span class="nn-node n1"></span>
          <span class="nn-node n2"></span>
          <span class="nn-node n3"></span>
          <span class="nn-line l1"></span>
          <span class="nn-line l2"></span>
          <span class="nn-line l3"></span>
        </span>
      </div>
      <div class="brand-text">
        <span class="brand-title">AI 数字化智能服务平台</span>
        <span class="brand-slogan">数智增效，一键触达全业务</span>
      </div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab" :class="{ active: activePanel === 'chat' }" @click="switchPanel('chat')">
        <span class="nav-icon">💬</span>AI 助手</button>
      <button class="nav-tab" :class="{ active: activePanel === 'data' }" @click="switchPanel('data')">
        <span class="nav-icon">🎯</span>意图训练</button>
      <button class="nav-tab" :class="{ active: activePanel === 'docs' }" @click="switchPanel('docs')">
        <span class="nav-icon">📚</span>知识库</button>
      <button class="nav-tab" :class="{ active: activePanel === 'train' }" @click="switchPanel('train')">
        <span class="nav-icon">🔧</span>模型训练</button>
      <button class="nav-tab" :class="{ active: activePanel === 'tools' }" @click="switchPanel('tools')">
        <span class="nav-icon">🔗</span>集成配置</button>
      <button class="nav-tab" :class="{ active: activePanel === 'users' }" @click="switchPanel('users')">
        <span class="nav-icon">👥</span>用户管理</button>
      <button class="nav-tab" :class="{ active: activePanel === 'system' }" @click="switchPanel('system')">
        <span class="nav-icon">📡</span>系统状态</button>
    </div>

    <div class="nav-right">
      <span class="nav-user">
        <span id="headerUser" style="cursor:pointer" @click="showPwdModal = true" title="点击修改密码"
              x-text="currentUser ? '👤 ' + currentUser : ''"></span>
        <a class="logout-link" @click="doLogout()" title="退出登录">退出</a>
      </span>
    </div>
  </div>
</nav>

<!-- ====== 主内容区 ====== -->
<main class="main">
  <!-- PANELS -->
</main>

<!-- ====== 修改密码弹窗 ====== -->
<div class="modal-overlay" x-show="showPwdModal" x-cloak
     @click.self="showPwdModal = false" @keyup.escape="showPwdModal = false">
  <div class="modal-card">
    <h3 style="margin-bottom:16px">🔒 修改密码</h3>
    <div style="margin-bottom:12px">
      <label>当前密码</label>
      <input type="password" x-model="pwdOld" placeholder="输入当前密码" style="width:100%">
    </div>
    <div style="margin-bottom:12px">
      <label>新密码</label>
      <input type="password" x-model="pwdNew" placeholder="输入新密码" style="width:100%">
    </div>
    <div style="margin-bottom:16px">
      <label>确认新密码</label>
      <input type="password" x-model="pwdConfirm" placeholder="再次输入新密码" style="width:100%">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" @click="changePwd()">确认修改</button>
      <button class="btn btn-outline" @click="showPwdModal = false">取消</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
