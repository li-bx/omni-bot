<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 数字化智能服务平台</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: #fff; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-box .logo { text-align: center; margin-bottom: 30px; }
.login-box .logo .icon { width: 72px; height: 72px; margin: 0 auto 16px; position: relative; }
/* 神经网络核心 */
.ln-core { position: absolute; inset: 5px; background: radial-gradient(circle at 50% 50%, rgba(99,102,241,0.3), rgba(15,23,42,0.95)); border-radius: 50%; box-shadow: 0 0 20px rgba(99,102,241,0.4), inset 0 0 16px rgba(99,102,241,0.15); }
/* 神经节点 */
.ln-node { position: absolute; border-radius: 50%; z-index: 2; }
.ln-ctr { width: 12px; height: 12px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #22D3EE; box-shadow: 0 0 12px rgba(34,211,238,0.8), 0 0 24px rgba(34,211,238,0.4); animation: lnPulse 2s ease-in-out infinite; }
.ln-n1 { width: 7px; height: 7px; top: 8px; left: 50%; transform: translateX(-50%); background: #A78BFA; box-shadow: 0 0 7px rgba(167,139,250,0.6); animation: lnPulse 2s ease-in-out 0.4s infinite; }
.ln-n2 { width: 7px; height: 7px; bottom: 10px; left: 12px; background: #818CF8; box-shadow: 0 0 7px rgba(129,140,248,0.6); animation: lnPulse 2s ease-in-out 0.8s infinite; }
.ln-n3 { width: 7px; height: 7px; bottom: 10px; right: 12px; background: #818CF8; box-shadow: 0 0 7px rgba(129,140,248,0.6); animation: lnPulse 2s ease-in-out 1.2s infinite; }
@keyframes lnPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
/* 连接线 */
.ln-line { position: absolute; z-index: 1; height: 1.5px; background: linear-gradient(90deg, rgba(129,140,248,0.5), rgba(34,211,238,0.5)); transform-origin: left center; }
.ln-l1 { width: 20px; top: 13px; left: 50%; transform: rotate(-75deg); animation: lnFlash 3s ease-in-out infinite; }
.ln-l2 { width: 19px; bottom: 16px; left: 18px; transform: rotate(35deg); animation: lnFlash 3s ease-in-out 0.5s infinite; }
.ln-l3 { width: 19px; bottom: 16px; right: 10px; transform: rotate(-35deg); animation: lnFlash 3s ease-in-out 1s infinite; }
@keyframes lnFlash { 0%,100% { opacity: 0.35; } 50% { opacity: 0.8; } }
/* 旋转光环 */
.ln-core::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid transparent; border-top-color: rgba(34,211,238,0.5); border-right-color: rgba(34,211,238,0.3); border-bottom-color: rgba(34,211,238,0.2); animation: lnSpin 8s linear infinite; }
@keyframes lnSpin { to { transform: rotate(360deg); } }
.login-box .logo h1 { font-size: 22px; color: #111827; font-weight: 700; }
.login-box .logo p { font-size: 13px; color: #6b7280; margin-top: 4px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
.btn-login { width: 100%; padding: 12px; background: linear-gradient(135deg, #1d4ed8, #1e40af); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn-login:hover { opacity: 0.9; }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
.error-msg.show { display: block; }
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <div class="icon">
      <span class="ln-core">
        <span class="ln-node ln-ctr"></span>
        <span class="ln-node ln-n1"></span>
        <span class="ln-node ln-n2"></span>
        <span class="ln-node ln-n3"></span>
        <span class="ln-line ln-l1"></span>
        <span class="ln-line ln-l2"></span>
        <span class="ln-line ln-l3"></span>
      </span>
    </div>
    <h1>AI 数字化智能服务平台</h1>
    <p style="font-size:14px;font-weight:600;margin-top:6px;letter-spacing:0.08em;background:linear-gradient(135deg,#4F46E5,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">数智驱动，一键触达全业务</p>
  </div>
  <form onsubmit="login(event)">
    <div class="form-group">
      <label>账户</label>
      <input type="text" id="username" placeholder="请输入账户" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button type="submit" class="btn-login" id="btnLogin">登 录</button>
    <div class="error-msg" id="errorMsg">账户或密码错误</div>
  </form>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errorMsg');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '登录中...';

  try {
    const resp = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      localStorage.setItem('token', data.token);
      window.location.href = '/';
    } else {
      err.classList.add('show');
    }
  } catch(e) {
    err.textContent = '网络错误，请重试';
    err.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = '登 录';
}
</script>

</body>
</html>
