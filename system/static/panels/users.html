<div id="panel-users" class="panel" x-show="activePanel === 'users'" x-cloak>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">👤 用户管理</h3>
      <button class="btn btn-primary btn-sm"
              hx-get="/ui/users/form" hx-target="body" hx-swap="beforeend">+ 添加用户</button>
    </div>
    <div id="userList" style="margin-top:14px;font-size:13px"
         hx-get="/ui/users" hx-trigger="refreshUsers from:body, load once" hx-swap="innerHTML">
      加载中...
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">🔑 角色管理</h3>
      <form hx-post="/ui/roles" hx-target="#roleList" hx-swap="innerHTML"
            hx-on::after-request="this.reset()" style="display:flex;gap:8px" @submit.prevent>
        <input name="name" placeholder="新角色名称" style="width:150px" required>
        <button class="btn btn-primary btn-sm" type="submit">添加角色</button>
      </form>
    </div>
    <div id="roleList" style="margin-top:14px;font-size:13px"
         hx-get="/ui/roles" hx-trigger="refreshRoles from:body, load once" hx-swap="innerHTML">
      加载中...
    </div>
    <div id="rolePermCard"></div>
  </div>
</div>
